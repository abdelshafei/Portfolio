<div class="body">
    <h2 class="title" appReveal>
        Tech Stack
    </h2>

    <!-- Free-floating field: every icon crosses the section on its own path,
         with its own speed, direction, baseline, and wave amplitude -->
    <div class="float-field" appReveal [revealDelay]="100">
        <div class="float-x"
             *ngFor="let skill of skills; let i = index"
             [style.top]="topPos(i)"
             [style.--x-dur]="xDur(i)"
             [style.--x-delay]="xDelay(i)"
             [style.--x-dir]="xDir(i)">
            <div class="float-y"
                 [style.--y-amp]="yAmp(i)"
                 [style.--y-dur]="yDur(i)"
                 [style.--y-delay]="yDelay(i)">
                <app-skill-icon [skillDets]="skill"></app-skill-icon>
            </div>
        </div>
    </div>
</div>
