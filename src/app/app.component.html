<div class="bg-scene" aria-hidden="true">
  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>
  <div class="aurora aurora-3"></div>
  <canvas #starCanvas class="star-canvas"></canvas>
</div>

<div class="scroll-progress" [style.width.%]="scrollProgress()" aria-hidden="true"></div>

<div class="main-content">
  <div id="home">
    <app-home></app-home>
  </div>

  <div id="timeline">
    <app-timeline></app-timeline>
  </div>

  <div id="projects">
    <app-projects></app-projects>
  </div>

  <div id="about">
    <app-about></app-about>
  </div>

  <div id="Contact-Form" class="btn">
    <a href="#Contact-Form" class="contactBtn" (mouseenter)="isHovered = true" (mouseleave)="isHovered = false" (click)="openContact = true">
      <i class="fa fa-envelope"></i>
      <span>• Contact Me</span>
    </a>
  </div>

  <app-nav></app-nav>

  <div class="footer-wrapper">
    <span class="left-foot">© {{ Year }} Abdelrahman ElShafay</span>
    <span class="right-foot">Built with Angular 19</span>
  </div>
</div>

<div class="overlay" *ngIf="openContact === true" (click)="openContact = false">
  <app-contact-form (click)="$event.stopPropagation()" (close)="openContact = false"></app-contact-form>
</div>

<div #bubbleCursor class="bubble-cursor" aria-hidden="true">
  <div class="bubble-inner"></div>
</div>
